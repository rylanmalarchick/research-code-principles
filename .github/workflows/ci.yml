name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    name: ${{ matrix.language }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            setup: python
          - language: rust
            setup: rust
          - language: cpp
            setup: cpp
          - language: julia
            setup: julia
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        if: matrix.setup == 'python'
        with:
          python-version: "3.11"
      - name: Install Rust
        if: matrix.setup == 'rust'
        uses: dtolnay/rust-toolchain@stable
      - name: Install CMake
        if: matrix.setup == 'cpp'
        uses: lukka/get-cmake@latest
      - uses: julia-actions/setup-julia@v2
        if: matrix.setup == 'julia'
        with:
          version: "1.10"
      - name: Install Python deps
        if: matrix.language == 'python'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,hdf5]"
      - name: Pytest
        if: matrix.language == 'python'
        run: pytest -x
      - name: Ruff
        if: matrix.language == 'python'
        run: ruff check agentbible/
      - name: Mypy
        if: matrix.language == 'python'
        run: mypy agentbible/
      - name: Coverage
        if: matrix.language == 'python'
        run: pytest --cov=agentbible --cov-fail-under=80
      - name: Rust checks
        if: matrix.language == 'rust'
        run: |
          cd languages/rust
          cargo test
          cargo clippy -- -D warnings
          cargo fmt --check
      - name: C++ checks
        if: matrix.language == 'cpp'
        run: |
          cd languages/cpp
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          ctest --test-dir build --output-on-failure
      - name: Julia tests
        if: matrix.language == 'julia'
        run: |
          cd languages/julia
          julia --project=. -e "using Pkg; Pkg.test()"
